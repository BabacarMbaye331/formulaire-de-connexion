<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupèration de mot de passe</title>
    <!-- link fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link css -->
    <link rel="stylesheet" href="styles/oublier.css">
    <!-- link js -->
    <script src="mdpOublier.js" defer></script>
</head>

<body>
    <main>
        <div class="container mdpOublier">
            <div class="des_mdpOublier">
                <h1>Récupèration par Emaile</h1>
                <p>Veillez consulter votre email pour changer votre mot de passe !</p>
            </div>
            <form action="" class="form_mdpOubier">
                <div class="champs">
                    <label for="email">Email de récupèration</label>
                    <input type="email" name="email" id="email" placeholder="email...">
                </div>
                <div><button type="submit" class="btn_mdpOublier">Envoyer</button></div>
                <p><a href="index.html" class="btn_connexion">connexion</a></p>
            </form>
        </div>
    </main>
</body>

</html>
