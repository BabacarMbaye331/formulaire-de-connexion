<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page d'inscription</title>
    <!-- link fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link css -->
    <link rel="stylesheet" href="../styles/inscrire.css">
    <!-- lienk js -->
    <script src="../js/inscription.js" defer type="module"></script>
</head>

<body>
    <div class="container insciption">
        <div class="description_inscription">
            <span class="icon_inscription"><i class="fa-solid fa-user-plus"></i></span>
            <h1>Inscrire</h1>
            <p>Remplissez soinieusement vos informations !</p>
        </div>
        <form action="" class="form_inscription" role="inscription">
            <div class="user">
                <div class="champs_nom">
                    <label for="nom">Nom</label>
                    <input type="text" name="nom" id="nom" placeholder="nom">
                    <p class="errorNom"></p>
                </div>
                <div class="champs_prenom">
                    <label for="prenom">Prenom</label>
                    <input type="text" name="prenom" id="prenom" placeholder="prenom">
                    <p class="errorPrenom"></p>
                </div>
            </div>
            <div class="champs">
                <label for="dateNaissance">Date de nassance</label>
                <input type="date" name="dateNaissance" id="dateNaissance">
                <p class="errorDateNaiss"></p>
            </div>
            <div class="champs">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="email">
                <p class="errorEmail"></p>
            </div>
            <div class="champs">
                <label for="mdp">Mot de pass</label>
                <input type="password" name="mdp" id="mdp" placeholder="mot de passe">
                <p class="errorMDP"></p>
            </div>
            <div class="champs">
                <label for="conf_mdp">Confirmer mot de pass</label>
                <input type="password" name="conf_mdp" id="conf_mdp" placeholder="confirmer mot de passe">
                <p class="errorConfMDP"></p>
            </div>
            <div class="champs_confirmer">
                <p class="errorValidDonnees"></p>
                <input type="radio" name="check_confirme" id="check_confirme">
                <label for="check_confirme">confirmer tous les informations !</label>
            </div>
            <button type="submit" class="btn_inscription">Inscrire</button>
            <p><a href="../index.html" class="connexion">connexion</a></p>
        </form>
    </div>
</body>

</html>
